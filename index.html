<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Para Você ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
}

/* tela de senha */

#login{
position:fixed;
width:100%;
height:100vh;
background:#0f0f0f;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
text-align:center;
}

input{
padding:10px;
font-size:18px;
border-radius:8px;
border:none;
margin-top:10px;
}

button{
padding:10px 20px;
font-size:18px;
border:none;
border-radius:8px;
background:#ff4d6d;
color:white;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#ff1e4d;
}

/* site */

#site{
display:none;
text-align:center;
padding-top:100px;
}

</style>
</head>

<body>

<!-- TELA DE SENHA -->

<div id="login">

<h2>Digite a senha para entrar 💌</h2>

<p>Dica: um dia mt importante pra gente</p>

<input type="password" id="senha" placeholder="Digite a senha">

<br>

<button onclick="entrar()">Entrar</button>

</div>


<!-- SEU SITE NORMAL -->

<div id="site">

<h1>❤️ Para Você ❤️</h1>

<p>
Esse site é só pra te lembrar o quanto você é importante pra mim.
Mesmo longe, você é uma das melhores coisas que já aconteceu na minha vida.
</p>

</div>


<!-- MUSICA -->

<audio autoplay loop>
<source src="musica.mp3" type="audio/mp3">
</audio>


<script>

function entrar(){

var senha = document.getElementById("senha").value;

if(senha === "09112025"){

document.getElementById("login").style.display="none";
document.getElementById("site").style.display="block";

}else{

alert("Senha errada 😢");

}

}

</script>

</body>
</html>
