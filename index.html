<!DOCTYPE html>
<html>
<head>
<title>Para você ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ff4e8a,#ff8fb3);
font-family:Arial;
color:white;
text-align:center;
overflow:hidden;
}

h1{
font-size:50px;
}

button{
padding:15px 35px;
font-size:20px;
border:none;
border-radius:10px;
background:white;
color:#ff4e8a;
cursor:pointer;
}

#mensagem{
margin-top:20px;
font-size:22px;
max-width:500px;
}

.coracao{
position:absolute;
top:-10px;
color:white;
animation:cair 5s linear infinite;
}

@keyframes cair{
0%{
transform:translateY(-10px);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}

</style>
</head>

<body>

<h1>Feliz Dia da Mulher ❤️</h1>
<h2>Para a mulher mais incrível do mundo</h2>

<p id="tempo"></p>

<button onclick="mostrar()">Clique aqui</button>

<div id="mensagem"></div>

<script>

function mostrar(){
document.getElementById("mensagem").innerHTML =
"Mesmo longe, você é a melhor parte do meu dia. Eu te amo muito ❤️";
}

function atualizarTempo(){

let inicio = new Date("2025-11-11")
let agora = new Date()

let diff = agora - inicio

let dias = Math.floor(diff / (1000*60*60*24))

document.getElementById("tempo").innerHTML =
"Eu te amo há " + dias + " dias ❤️"

}

setInterval(atualizarTempo,1000)

function criarCoracao(){

let coracao = document.createElement("div")
coracao.className="coracao"
coracao.innerHTML="❤️"

coracao.style.left=Math.random()*100+"vw"
coracao.style.fontSize=(Math.random()*20+10)+"px"

document.body.appendChild(coracao)

setTimeout(()=>{
coracao.remove()
},5000)

}

setInterval(criarCoracao,300)

</script>

</body>
</html>
