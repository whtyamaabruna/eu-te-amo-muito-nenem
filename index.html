<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Para Você ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#ff6fa5;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

/* botão */

#botao{
position:absolute;
padding:15px 30px;
font-size:22px;
border:none;
border-radius:10px;
background:#ff2f6d;
color:white;
cursor:pointer;
}

/* conteúdo */

#conteudo{
display:none;
max-width:700px;
padding:20px;
z-index:2;
}

#euTeAmo{
font-size:50px;
margin-bottom:10px;
}

#contador{
font-size:20px;
margin-bottom:20px;
}

#texto{
font-size:22px;
line-height:1.6;
}

/* player */

#player{
margin-top:30px;
background:rgba(255,255,255,0.15);
padding:20px;
border-radius:15px;
}

#player img{
width:150px;
height:150px;
object-fit:cover;
border-radius:15px;
margin-bottom:10px;
}

button.playerBtn{
padding:10px 20px;
border:none;
border-radius:10px;
background:#ff2f6d;
color:white;
font-size:16px;
cursor:pointer;
}

input[type=range]{
width:150px;
}

/* corações */

.heart{
position:fixed;
bottom:-20px;
color:red;
font-size:20px;
animation:subir 6s linear infinite;
}

@keyframes subir{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-110vh);opacity:0;}
}

/* estrelas */

.star{
position:fixed;
color:white;
font-size:10px;
opacity:0.8;
animation:brilhar 2s infinite alternate;
}

@keyframes brilhar{
from{opacity:0.3}
to{opacity:1}
}

</style>
</head>

<body>

<button id="botao">Clique aqui</button>

<div id="conteudo">

<div id="euTeAmo">Eu te amo ❤️</div>

<div id="contador">Estamos juntos há 117 dias ❤️</div>

<p id="texto"></p>

<div id="player">

<img src="foto.jpg">

<br>

<button class="playerBtn" onclick="toggleMusic()">Play / Pause</button>

<br><br>

Volume

<br>

<input type="range" min="0" max="1" step="0.01" onchange="mudarVolume(this.value)">

</div>

</div>

<audio id="musica">
<source src="musica.mp3" type="audio/mp3">
</audio>

<script>

let tentativas = 0
let botao = document.getElementById("botao")
let musica = document.getElementById("musica")

musica.volume = 0.2

botao.addEventListener("mouseover", function(){

if(tentativas < 3){

let x = Math.random() * (window.innerWidth - 150)
let y = Math.random() * (window.innerHeight - 80)

botao.style.left = x + "px"
botao.style.top = y + "px"

tentativas++

}

})

botao.addEventListener("click", function(){

if(tentativas >= 3){

botao.style.display="none"

document.getElementById("conteudo").style.display="block"

musica.play()

setTimeout(escreverTexto,1500)

}

})

/* player */

function toggleMusic(){

if(musica.paused){

musica.play()

}else{

musica.pause()

}

}

function mudarVolume(valor){

musica.volume = valor

}

/* TEXTO ESCREVENDO */

let mensagem = "Desde o dia que a gente se conheceu minha vida ficou muito mais feliz. Mesmo a gente estando longe, você é a pessoas mais importantes pra mim, obrigado por tudo que vc ja fez e faz por mim, e sempre vou fazer de tudo pra gente dar certo indenpendente de qualquer dificuldade a gente vai passar por tudo juntos. hoje é seu dia e não so hoje como todos os outros, eu tenho muito orgulho da mulher incrivel que voce é, parabens pelo seu dia minha nenem, eu te amo tanto meu amor ❤️"

let i = 0

function escreverTexto(){

if(i < mensagem.length){

document.getElementById("texto").innerHTML += mensagem.charAt(i)

i++

setTimeout(escreverTexto,35)

}

}

/* corações */

function criarCoracao(){

let heart = document.createElement("div")

heart.className="heart"

heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"

heart.style.fontSize=(Math.random()*20+10)+"px"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),6000)

}

setInterval(criarCoracao,300)

/* estrelas */

function criarEstrela(){

let star=document.createElement("div")

star.className="star"

star.innerHTML="✦"

star.style.left=Math.random()*100+"vw"

star.style.top=Math.random()*100+"vh"

star.style.fontSize=(Math.random()*8+5)+"px"

document.body.appendChild(star)

}

for(let i=0;i<60;i++){
criarEstrela()
}

</script>

</body>
</html>
