<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Para Você ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff4d6d,#0f0f0f);
color:white;
font-family:Arial;
overflow:hidden;
text-align:center;
}

.container{
max-width:600px;
z-index:2;
}

h1{
font-size:45px;
}

p{
font-size:22px;
}

/* corações */

.heart{
position:fixed;
bottom:-10px;
color:red;
font-size:20px;
animation:subir 6s linear infinite;
}

@keyframes subir{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-110vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<h1>💌 Para Você</h1>

<p id="texto"></p>

</div>

<audio autoplay loop>
<source src="musica.mp3" type="audio/mp3">
</audio>

<script>

/* texto digitando */

var mensagem = "Desde o dia que a gente se conheceu minha vida ficou muito mais feliz. Mesmo a gente estando longe, você é a pessoas mais importantes pra mim, obrigado por tudo que vc ja fez e faz por mim, e sempre vou fazer de tudo pra gente dar certo indenpendente de qualquer dificuldade a gente vai passar por tudo juntos. hoje é seu dia e não so hoje como todos os outros, eu tenho muito orgulho da mulher incrivel que voce é, parabens pelo seu dia minha nenem, eu te amo tanto meu amor ❤️";

var i = 0;

function escrever(){

if(i < mensagem.length){

document.getElementById("texto").innerHTML += mensagem.charAt(i);

i++;

setTimeout(escrever,40);

}

}

escrever();


/* corações caindo */

function criarCoracao(){

var heart = document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*20+10)+"px";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},6000);

}

setInterval(criarCoracao,300);

</script>

</body>
</html>
